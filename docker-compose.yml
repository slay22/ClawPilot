services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  dashboard:
    build:
      context: .
      dockerfile: src/ClawPilot.Dashboard/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - postgres

  worker:
    build:
      context: .
      dockerfile: src/ClawPilot.Worker/Dockerfile
    ports:
      - "9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      - Telegram__BotToken=${TELEGRAM_BOT_TOKEN}
      - Telegram__ChatId=${TELEGRAM_CHAT_ID}
      - GitHub__CopilotToken=${GITHUB_COPILOT_TOKEN}
      - GitHub__Mcp__Pat=${GITHUB_PAT}
      - ConnectionStrings__Database=Host=postgres;Username=postgres;Password=password;Database=postgres
      - ConnectionStrings__Journal=Data Source=/app/data/clawpilot.db
      - Dashboard__Url=http://dashboard:8080/logHub
      - WebSearch__TavilyApiKey=${TAVILY_API_KEY}
      - Email__ImapHost=${EMAIL_IMAP_HOST:-}
      - Email__ImapPort=${EMAIL_IMAP_PORT:-993}
      - Email__ImapUseSsl=${EMAIL_IMAP_SSL:-true}
      - Email__SmtpHost=${EMAIL_SMTP_HOST:-}
      - Email__SmtpPort=${EMAIL_SMTP_PORT:-587}
      - Email__SmtpUseSsl=${EMAIL_SMTP_SSL:-false}
      - Email__Username=${EMAIL_USERNAME:-}
      - Email__Password=${EMAIL_PASSWORD:-}
      - Email__FromName=${EMAIL_FROM_NAME:-ClawPilot Agent}
      - Email__FromAddress=${EMAIL_FROM_ADDRESS:-}
      - Cli__Port=${CLI_PORT:-9001}
      - PrRunner__WebhookSecret=${PR_WEBHOOK_SECRET}
      - PrRunner__GitPat=${PR_GIT_PAT}
      - PrRunner__ContainerImage=${PR_RUNNER_IMAGE:-claw-pilot-runner:latest}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/clawpilot-runs:/tmp/clawpilot-runs
    depends_on:
      postgres:
        condition: service_healthy
      dashboard:
        condition: service_started
